[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_22"]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-interaction",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p /app/database",
  "touch /app/database/database.sqlite"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=8000"
